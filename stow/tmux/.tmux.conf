# ── Pane navigation: Ctrl + arrow keys (no prefix) ──────────────────
bind -n C-Left  select-pane -L
bind -n C-Right select-pane -R
bind -n C-Up    select-pane -U
bind -n C-Down  select-pane -D

# ── Window navigation: Ctrl + Shift + arrow keys (no prefix) ────────
bind -n C-S-Left  previous-window
bind -n C-S-Right next-window
# Up/Down also cycle windows for convenience
bind -n C-S-Up    previous-window
bind -n C-S-Down  next-window

# ── Simpler split bindings (prefix + | and -) ───────────────────────
# v splits vertically (side-by-side), h splits horizontally (stacked)
bind v split-window -h -c "#{pane_current_path}"
bind h split-window -v -c "#{pane_current_path}"
# Remove the defaults
unbind '"'
unbind %
